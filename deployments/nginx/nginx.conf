# Fleet Monitoring API Gateway
# Single entrypoint for frontend, auth, APIs, and websocket streams.

# WebSocket connection upgrade mapping.
map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

# Basic per-IP rate limiting zone for auth endpoints.
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=20r/m;

server {
  listen 80;
  server_name _;

  # Docker internal DNS resolver for dynamic container IP updates.
  resolver 127.0.0.11 valid=10s ipv6=off;
  set $frontend_upstream frontend:5173;
  set $keycloak_upstream keycloak:8080;
  set $vehicle_upstream vehicle-service:8094;
  set $ingestion_upstream ingestion-service:8091;
  set $ws_upstream websocket-service:8093;

  # Shared proxy headers.
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # Sensible defaults for API traffic.
  client_max_body_size 10m;
  proxy_connect_timeout 5s;
  proxy_send_timeout 60s;
  proxy_read_timeout 60s;

  # Security headers.
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Keycloak proxy (optional public endpoint via /auth).
  location /auth/ {
    limit_req zone=auth_limit burst=10 nodelay;
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Methods;
    add_header Access-Control-Allow-Origin $http_origin always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET,POST,OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type,Authorization" always;
    add_header Vary "Origin" always;
    if ($request_method = OPTIONS) {
      return 204;
    }
    proxy_set_header Host localhost;
    rewrite ^/auth/(.*)$ /$1 break;
    proxy_pass http://$keycloak_upstream;
  }

  # Vehicle service behind a stable prefix.
  location /vehicle/ {
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Methods;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET,POST,PATCH,DELETE,OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization,Content-Type,X-Request-Id" always;
    add_header Access-Control-Max-Age "86400" always;
    if ($request_method = OPTIONS) {
      return 204;
    }
    rewrite ^/vehicle/(.*)$ /$1 break;
    proxy_pass http://$vehicle_upstream;
  }

  # Ingestion service behind a stable prefix.
  location /ingestion/ {
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Methods;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET,POST,PATCH,DELETE,OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization,Content-Type,X-Request-Id" always;
    add_header Access-Control-Max-Age "86400" always;
    if ($request_method = OPTIONS) {
      return 204;
    }
    rewrite ^/ingestion/(.*)$ /$1 break;
    proxy_pass http://$ingestion_upstream;
  }

  # Websocket service (positions + alerts).
  location /ws/ {
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Methods;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET,POST,PATCH,DELETE,OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization,Content-Type,X-Request-Id" always;
    add_header Access-Control-Max-Age "86400" always;
    if ($request_method = OPTIONS) {
      return 204;
    }
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
    proxy_pass http://$ws_upstream;
  }

  # Forward everything else to frontend dev server.
  location / {
    proxy_pass http://$frontend_upstream;
  }
}
