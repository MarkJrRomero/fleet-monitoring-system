services:
  frontend:
    container_name: fleet-frontend
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT}:5173"
    restart: unless-stopped

  keycloak:
    container_name: fleet-keycloak
    image: quay.io/keycloak/keycloak:26.6.0
    command:
      - start-dev
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "${KEYCLOAK_PORT}:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ${KEYCLOAK_IMPORT_FILE}:/opt/keycloak/data/import/realm-export.json:ro
    restart: unless-stopped

  redis:
    container_name: fleet-redis
    image: redis:7.2-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    container_name: fleet-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  db-admin:
    container_name: fleet-db-admin
    image: adminer:4.8.1
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "${DB_ADMIN_PORT}:8080"
    depends_on:
      - postgres
    restart: unless-stopped

  redis-ui:
    container_name: fleet-redis-ui
    image: rediscommander/redis-commander:latest
    environment:
      REDIS_HOSTS: local:redis:6379
      HTTP_USER: ${REDIS_UI_USER}
      HTTP_PASSWORD: ${REDIS_UI_PASSWORD}
    ports:
      - "${REDIS_UI_PORT}:8081"
    depends_on:
      - redis
    restart: unless-stopped

  ingestion-service:
    container_name: fleet-ingestion-service
    build:
      context: ../services/ingestion-service
      dockerfile: Dockerfile
    environment:
      INGESTION_SERVICE_PORT: ${INGESTION_SERVICE_PORT}
      INGESTION_RECENT_TTL_SECONDS: ${INGESTION_RECENT_TTL_SECONDS}
      INGESTION_DEDUPE_WINDOW_SECONDS: ${INGESTION_DEDUPE_WINDOW_SECONDS}
      NOMINATIM_REVERSE_URL: ${NOMINATIM_REVERSE_URL}
      NOMINATIM_USER_AGENT: ${NOMINATIM_USER_AGENT}
      ALERTS_CHANNEL: ${ALERTS_CHANNEL}
      ROUTING_SERVICE_URL: ${ROUTING_SERVICE_URL}
      INGESTION_RETRY_QUEUE_SIZE: ${INGESTION_RETRY_QUEUE_SIZE}
      INGESTION_CB_FAILURE_THRESHOLD: ${INGESTION_CB_FAILURE_THRESHOLD}
      INGESTION_CB_RESET_SECONDS: ${INGESTION_CB_RESET_SECONDS}
      REDIS_URL: ${REDIS_URL}
      REDIS_POSITIONS_CHANNEL: ${REDIS_POSITIONS_CHANNEL}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE}
    ports:
      - "${INGESTION_SERVICE_PORT}:8091"
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  websocket-service:
    container_name: fleet-websocket-service
    build:
      context: ../services/websocket-service
      dockerfile: Dockerfile
    environment:
      WEBSOCKET_SERVICE_PORT: ${WEBSOCKET_SERVICE_PORT}
      REDIS_URL: ${REDIS_URL}
      REDIS_POSITIONS_CHANNEL: ${REDIS_POSITIONS_CHANNEL}
      REDIS_ALERTS_CHANNEL: ${REDIS_ALERTS_CHANNEL}
    ports:
      - "${WEBSOCKET_SERVICE_PORT}:8093"
    depends_on:
      - redis
    restart: unless-stopped

  vehicle-service:
    container_name: fleet-vehicle-service
    build:
      context: ../services/vehicle-service
      dockerfile: Dockerfile
    environment:
      VEHICLE_SERVICE_PORT: ${VEHICLE_SERVICE_PORT}
      INGESTION_BASE_URL: ${INGESTION_BASE_URL}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE}
    ports:
      - "${VEHICLE_SERVICE_PORT}:8094"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  keycloak_data:
  redis_data:
  postgres_data:
