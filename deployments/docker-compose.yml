services:
  frontend:
    container_name: fleet-frontend
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT}:5173"
    restart: unless-stopped

  keycloak:
    container_name: fleet-keycloak
    image: quay.io/keycloak/keycloak:26.6.0
    command:
      - start-dev
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "${KEYCLOAK_PORT}:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ${KEYCLOAK_IMPORT_FILE}:/opt/keycloak/data/import/realm-export.json:ro
    restart: unless-stopped

volumes:
  keycloak_data:
